name: Build & Release DMG

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-dmg:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Write .env with bundled OAuth credentials
        env:
          APP_GITHUB_CLIENT_ID:     ${{ secrets.APP_GITHUB_CLIENT_ID }}
          APP_GITHUB_CLIENT_SECRET: ${{ secrets.APP_GITHUB_CLIENT_SECRET }}
          APP_SLACK_CLIENT_ID:      ${{ secrets.APP_SLACK_CLIENT_ID }}
          APP_SLACK_CLIENT_SECRET:  ${{ secrets.APP_SLACK_CLIENT_SECRET }}
          APP_GOOGLE_CLIENT_ID:     ${{ secrets.APP_GOOGLE_CLIENT_ID }}
          APP_GOOGLE_CLIENT_SECRET: ${{ secrets.APP_GOOGLE_CLIENT_SECRET }}
        run: |
          echo "GITHUB_CLIENT_ID=$APP_GITHUB_CLIENT_ID"     >> .env
          echo "GITHUB_CLIENT_SECRET=$APP_GITHUB_CLIENT_SECRET" >> .env
          echo "SLACK_CLIENT_ID=$APP_SLACK_CLIENT_ID"       >> .env
          echo "SLACK_CLIENT_SECRET=$APP_SLACK_CLIENT_SECRET"   >> .env
          echo "GOOGLE_CLIENT_ID=$APP_GOOGLE_CLIENT_ID"     >> .env
          echo "GOOGLE_CLIENT_SECRET=$APP_GOOGLE_CLIENT_SECRET" >> .env

      - name: Set version from release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          CURRENT_VERSION="$(node -p "require('./package.json').version")"

          if [ "$CURRENT_VERSION" != "$VERSION" ]; then
            npm version "$VERSION" --no-git-tag-version
          else
            echo "package.json already at version $VERSION, skipping"
          fi

      - name: Build app bundle
        run: npm run prebuild && npx electron-builder --mac dir --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Ad-hoc sign
        run: codesign --deep --force --sign - "dist/mac-arm64/WorkPulse.app"

      - name: Package DMG
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          hdiutil create -volname "WorkPulse" \
            -srcfolder "dist/mac-arm64/WorkPulse.app" \
            -ov -format UDZO \
            "dist/WorkPulse-${VERSION}-arm64.dmg"

      - name: Attach DMGs to release
        run: gh release upload "${{ github.event.release.tag_name }}" dist/*.dmg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
